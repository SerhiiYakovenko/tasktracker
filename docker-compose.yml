services:
  backend:
    build: ./backend
    image: tasktracker-backend
    container_name: tasktracker-backend
    # Seed an idempotent demo user + sample board, then start the API.
    command: ["sh", "-c", "python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    environment:
      # Persist SQLite to the shared named volume mounted at /app/data.
      DATABASE_URL: sqlite:///./data/app.db
      SECRET_KEY: ${SECRET_KEY:-change-me}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the static bundle at build time so the SPA knows where the API lives.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    image: tasktracker-frontend
    container_name: tasktracker-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:
